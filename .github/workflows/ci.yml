name: ci
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # build context and Dockerfile live in ./app morfe comment
      - name: Build
        run: docker build -t myapp:${{ github.sha }} ./app

      - name: Test
        run: docker run --rm myapp:${{ github.sha }} npm test

      - name: Log in to Docker Hub
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Tag & push
        run: |
          docker tag myapp:${{ github.sha }} levep79/myapp:${{ github.sha }}
          docker push levep79/myapp:${{ github.sha }}
